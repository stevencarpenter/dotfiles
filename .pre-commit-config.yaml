repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: (^mcp_sync/tests/test_data/malformed_json\.json$|\.json\.tmpl$)
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-ast
      - id: check-symlinks
      - id: detect-private-key
      - id: forbid-new-submodules
      - id: name-tests-test
        args:
          - --pytest-test-first
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-aws-credentials
        args:
          - "--allow-missing-credentials"

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: machine-capability-audit
        name: Machine capability gating audit
        description: Find orphan capabilities, undefined gates, and prefix gates that could migrate
        language: script
        entry: .claude/skills/machine-capability-audit/scripts/audit.sh
        files: ^(\.chezmoidata/machines\.toml|\.chezmoiignore|.+\.tmpl)$
        pass_filenames: false

      - id: strip-claude-trailer
        name: Strip Co-Authored-By Claude trailer
        description: Enforce the no-Claude-attribution rule from dot_claude/CLAUDE.md
        language: script
        entry: scripts/strip-claude-trailer.sh
        stages: [commit-msg]

default_install_hook_types: [pre-commit, commit-msg]
default_language_version:
  python: python3.14
