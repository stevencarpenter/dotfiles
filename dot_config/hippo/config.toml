[inference]
base_url = "http://127.0.0.1:42069/v1" # oMLX local server (LM Studio: :1234)
timeout_secs = 300                    # HTTP timeout for chat/embed calls

[models]
enrichment = "Qwen3.6-35B-A3B-MLX-8bit"       # Daily: MoE, 35B total, 3B active — fast (omlx model ID)
enrichment_bulk = "Qwen3.6-35B-A3B-MLX-8bit"  # Bulk: strongest available — slow but reliable
query = "Qwen3.6-35B-A3B-MLX-8bit"            # Same model for query reformulation
embedding = "nomicai-modernbert-embed-base-8bit" # 768d MLX embedding (ModernBERT, nomic lineage)

[daemon]
flush_interval_ms = 100 # Write buffer flush interval (ms)
flush_batch_size = 50   # Max events per flush
socket_timeout_ms = 100 # CLI-to-daemon socket timeout (ms)

[brain]
port = 9175
poll_interval_secs = 5     # Enrichment queue poll interval
enrichment_batch_size = 10 # Events per enrichment batch (session-based live enrichment)
max_events_per_chunk = 10  # Max events per enrichment chunk
max_queue_depth = 100      # Max pending enrichment items
query_timeout_secs = 300   # GUI timeout for /ask and /query requests (seconds)

[github]
enabled = true
watched_repos = [
  "stevencarpenter/hippo",
  "stevencarpenter/nuv",
  "stevencarpenter/dotfiles",
  "sjcarpenter/whistlepost",
  "stevencarpenter/homelab",
  "stevencarpenter/batallion",
]

[telemetry]
enabled = true
endpoint = "http://localhost:4317"

