# AeroSpace tiling window manager configuration
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# ─── General ─────────────────────────────────────────────────────────────────

start-at-login = true
after-startup-command = ['exec-and-forget sketchybar']
after-login-command = []

# Normalizations — keep the tree sane automatically
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout defaults
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 30

# Mouse follows focus when switching monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ─── SketchyBar Integration ──────────────────────────────────────────────────

exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]

# ─── Gaps ─────────────────────────────────────────────────────────────────────
# Top gap accounts for SketchyBar (32px bar + 8px padding)

[gaps]
inner.horizontal = 3
inner.vertical = 3
outer.left = 3
outer.right = 3
outer.bottom = 3
outer.top = 3

# ─── Main Mode ────────────────────────────────────────────────────────────────

[mode.main.binding]

# Focus (alt + hjkl)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window (alt-shift + hjkl)
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Workspaces (alt + number)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace (alt-shift + number)
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

# Layout
alt-comma = 'layout tiles horizontal vertical'
alt-period = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-f = 'layout floating tiling'
alt-shift-space = 'layout tiles accordion'

# Quick resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Enter modes
alt-r = 'mode resize'
alt-shift-semicolon = 'mode service'

# ─── Resize Mode ──────────────────────────────────────────────────────────────

[mode.resize.binding]
h = 'resize width -50'
l = 'resize width +50'
j = 'resize height +50'
k = 'resize height -50'
minus = 'resize smart -50'
equal = 'resize smart +50'
esc = 'mode main'
enter = 'mode main'

# ─── Service Mode ─────────────────────────────────────────────────────────────

[mode.service.binding]
r = ['reload-config', 'mode main']
f = ['flatten-workspace-tree', 'mode main']
esc = 'mode main'

# ─── Window Rules ─────────────────────────────────────────────────────────────
# Float apps that don't tile well

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SystemPreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'
