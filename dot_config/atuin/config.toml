# Self-hosted atuin sync target. Server lives on i9
# (homelab repo: services/atuin/, fronted by Caddy at logbook.snugmarina.org).
# Deployed only on machines where the `atuin` capability is true (see
# .chezmoidata/machines.toml).
#
# Verify the server is healthy from any tailnet device:
#   curl -fsSL https://logbook.snugmarina.org   # → "goodbye and good luck"
#
# Bootstrap on a fresh machine (server registration must be open — see
# homelab repo services/atuin/README.md "Bootstrap: register accounts"):
#   atuin register -u <username> -e <email> -p <password>   # first machine
#   atuin login    -u <username>                            # subsequent machines
#   atuin import auto
#   atuin sync
sync_address = "https://logbook.snugmarina.org"
