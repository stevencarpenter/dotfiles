# Remap prefix from 'C-b' to 'C-Space'
unbind C-b
set -g prefix C-Space

# [ PREFIX + r ] Reload tmux config
unbind r
bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display "Reload Configuration"

# Mouse support
set -g mouse on

# Move between panes vim style
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window

# Toggle last window / last pane
bind Tab last-window
bind BTab last-pane

# TMUX Sensible settings but my tweaks
# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 1000000 lines
set -g history-limit 1000000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Yazi compatibility
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Improve terminal colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Everforest dark-medium palette (extracted from TanglingTreats/tmux-everforest) ──
set -g @everforest_bg_dim '#232a2e'
set -g @everforest_bg0 '#2d353b'
set -g @everforest_bg1 '#343f44'
set -g @everforest_bg2 '#3d484d'
set -g @everforest_bg3 '#475258'
set -g @everforest_bg4 '#4f585e'
set -g @everforest_bg5 '#56635f'
set -g @everforest_bg_red '#514045'
set -g @everforest_bg_green '#425047'
set -g @everforest_bg_blue '#3a515d'
set -g @everforest_bg_yellow '#4d4c43'
set -g @everforest_fg '#d3c6aa'
set -g @everforest_red '#e67e80'
set -g @everforest_orange '#e69875'
set -g @everforest_yellow '#dbbc7f'
set -g @everforest_green '#a7c080'
set -g @everforest_aqua '#83c092'
set -g @everforest_blue '#7fbbb3'
set -g @everforest_purple '#d699b6'
set -g @everforest_grey0 '#7a8478'
set -g @everforest_grey1 '#859289'
set -g @everforest_grey2 '#9da9a0'

# ── Everforest styles (non-status-bar) ─────────────────────────────────────
set -g mode-style fg='#{@everforest_purple}',bg='#{@everforest_bg_red}'
set -g pane-border-style fg='#{@everforest_bg1}'
set -g pane-active-border-style fg='#{@everforest_blue}'
set -g display-panes-active-colour '#7fbbb3'
set -g display-panes-colour '#7fbbb3'
set -g message-style fg='#{@everforest_red}',bg='#{@everforest_bg_dim}'
set -g message-command-style fg='#{@everforest_bg3}',bg='#{@everforest_bg1}'
setw -g clock-mode-colour '#7fbbb3'
setw -g window-status-bell-style fg='#{@everforest_bg0}',bg='#{@everforest_red}'

# ── Dotbar config (everforest-themed, literal hex required for bash reads) ──
set -g @tmux-dotbar-bg '#2f383e'
set -g @tmux-dotbar-fg '#7a8478'
set -g @tmux-dotbar-fg-current '#d3c6aa'
set -g @tmux-dotbar-bold-current-window false
set -g @tmux-dotbar-fg-session '#859289'
set -g @tmux-dotbar-fg-prefix '#a7c080'
set -g @tmux-dotbar-position top
set -g @tmux-dotbar-right true
set -g @tmux-dotbar-status-right-text ' %H:%M #($HOME/.config/tmux/scripts/claude-pane-monitor.sh)'
# Claude state colors injected into dotbar's window format (green=working, yellow=idle)
set -g @tmux-dotbar-window-status-format '#{?#{==:#{@claude_state},working},#[fg=#a7c080],#{?#{==:#{@claude_state},idle},#[fg=#dbbc7f],}} #I:#W '

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'yardnsm/tmux-1password'
set -g @plugin 'jtbairdsr/tmux-inactive-panes'

# ── Active pane indicator: tmux-inactive-panes ──────────────────────────
set -g @default-inactive-color 'dark'
set -g @active-bg-color-dark   '#2d353b'   # everforest bg0 - active pane "lifted"
set -g @active-fg-color-dark   '#a7c080'   # everforest green - active border
set -g @inactive-bg-color-dark '#232a2e'   # everforest bg_dim - inactive matches terminal
set -g @inactive-fg-color-dark '#4f585e'   # everforest bg4 - inactive border

# Initialize TMUX plugin manager
run '$XDG_CONFIG_HOME/tmux/plugins/tpm/tpm'

# ── Post-TPM overrides ────────────────────────────────────────────────────

# Use pane titles as window names (Claude Code sets these with state spinners)
set -g automatic-rename on
set -g automatic-rename-format '#{=30:pane_title}'

# Start windows and panes numbering at 1 and renumber on close
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Claude state monitor runs via #() embedded in @tmux-dotbar-status-right-text above
# It sets @claude_state per window; dotbar's format includes color conditionals
