name: Dotfiles Hygiene CI

on:
  push:
    paths:
      - ".github/workflows/dotfiles-hygiene-ci.yml"
      - ".pre-commit-config.yaml"
      - ".chezmoiignore"
      - ".chezmoiscripts/**"
      - "dot_*"
      - "dot_config/**"
      - "scripts/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/dotfiles-hygiene-ci.yml"
      - ".pre-commit-config.yaml"
      - ".chezmoiignore"
      - ".chezmoiscripts/**"
      - "dot_*"
      - "dot_config/**"
      - "scripts/**"
      - "README.md"

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit checks
        run: pre-commit run --all-files

      - name: Validate MCP master config structure
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("dot_config/mcp/mcp-master.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          if not isinstance(data, dict):
              raise SystemExit("mcp-master.json must be a JSON object")

          # Master may define zero shared servers; the per-machine servers
          # live in machine overlays (dot_config/mcp/machine/*.json).
          servers = data.get("servers")
          if not isinstance(servers, dict):
              raise SystemExit("mcp-master.json must define a 'servers' object")

          for server_name, server_config in servers.items():
              if not isinstance(server_config, dict):
                  raise SystemExit(f"Server '{server_name}' must be a JSON object")
              if server_config.get("type") == "stdio" and not server_config.get("command"):
                  raise SystemExit(f"Server '{server_name}' uses stdio but has no 'command'")
          PY

      - name: Shell syntax checks
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            bash -n "${file}"
          done < <(find .chezmoiscripts scripts -type f -name "*.sh" -print0)

      - name: Validate SketchyBar clock popup behavior
        run: scripts/test-sketchybar-clock-popup.sh

      - name: Validate SketchyBar badge wiring
        run: scripts/test-sketchybar-badge-wiring.sh

      - name: Validate ca() drift-safety gate
        run: scripts/test-ca-drift-gate.sh

      - name: Install chezmoi
        run: |
          set -euo pipefail
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Validate Claude statusline rendering
        run: scripts/test-claude-statusline-command.sh
