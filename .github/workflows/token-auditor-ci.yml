name: Token Auditor CI

on:
  push:
    paths:
      - "token_auditor/**"
      - ".github/workflows/token-auditor-ci.yml"
  pull_request:
    paths:
      - "token_auditor/**"
      - ".github/workflows/token-auditor-ci.yml"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: token_auditor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version-file: token_auditor/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            token_auditor/.venv
          key: token-auditor-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('token_auditor/uv.lock') }}
          restore-keys: |
            token-auditor-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-
            token-auditor-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run ty check .

      - name: CLI smoke test
        run: |
          uv run token-auditor --help > /dev/null
          uv run codax --help > /dev/null

      - name: Test
        run: uv run pytest -v
