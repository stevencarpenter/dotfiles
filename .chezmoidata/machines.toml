# Machine capability table.
#
# Each row maps a machine name (matching the `.machine` data variable from
# .chezmoi.toml.tmpl) to a set of capability booleans. Templates and
# .chezmoiignore gate on these capabilities rather than on machine name
# prefixes so that adding a new machine is a one-row change here, not a
# scavenger hunt across every gate site.
#
# Access pattern in templates:
#   {{ if (index .machines .machine).tiling }} ... {{ end }}
#
# Adding a new machine: copy a row, rename, flip the capabilities you don't
# want. Adding a new capability: add the key to every row (default-false is
# fine if you also update the gate sites with `default false` on lookups).
#
# Capabilities
#   tiling — install/configure aerospace + sketchybar + borders (the tiling
#            window manager stack). Headless / Screen Share boxes set this
#            false because point-and-click + native macOS windowing is
#            preferred there.
#   atuin  — deploy ~/.config/atuin/config.toml pointing at the self-hosted
#            atuin server (homelab repo: services/atuin/). Off on work
#            machines so corporate shells never sync history to the home lab.
#   mcp    — deploy the MCP master config + run the post-apply sync hook that
#            generates per-tool MCP configs (codex, opencode, cursor, copilot,
#            …). Off on machines that don't run a constellation of AI dev
#            tools.
#   skills — deploy ~/.config/skills/ (the skill manifest + machine overlays)
#            and run the post-apply sync-skills hook that populates
#            ~/.claude/skills/ from vendored (mattpocock) and personal
#            skills. Off on machines that don't run Claude Code skills.
#   gui    — install GUI applications + display fonts. On for any machine
#            with a usable display, including lab-mac while it's reached via
#            macOS Screen Share (so Raycast / Ghostty / Obsidian / VS Code /
#            1Password etc. stay useful there). Flip false once a machine is
#            genuinely headless with no Screen Share path. CLI tools that
#            ship as `cask` (e.g. 1password-cli) stay outside this gate.
#   dev    — machine does language / web / mobile development. Gates
#            language-LSP plugins, copilot trusted folders for personal
#            projects, and dev-flavored Brewfile entries. Off on work
#            because work has its own dev-tool curation (mise infra block,
#            corporate dev environment) that we don't want to double-stack.
#            Off on lab because lab is a home server, not a dev box.
#   aws_sso — machine should run the AWS SSO profile generator
#            (aws_config_gen/) via the post-apply hook. Work-only because
#            personal / lab don't have AWS SSO. Scoped narrower than a
#            generic `aws` capability so future AWS-adjacent gates (CLI,
#            SDK, profiles) can carry their own keys without overloading.
#   infra  — install infrastructure / cluster-ops tooling via mise:
#            Kubernetes (kubectl, helm, k9s, kustomize), corporate access
#            (teleport-ent), and ops databases (mysql, duckdb). IaC
#            (terraform) and build tooling (gradle, goreleaser, pnpm) live in
#            the global mise block now — they install on every machine and
#            are not gated here. Distinct from `aws_sso` so AWS-only gates
#            stay narrow; lab can flip this on later when homelab cluster-ops
#            (k8s) actually moves there.
#   agent_journal — deploy the personal Obsidian agent-journal beta config,
#            CLI wrappers, and Claude lifecycle hook. Personal-only until the
#            workflow has proved itself in daily use.
#   agents — clone the personal agent-registry
#            (git@github.com:stevencarpenter/agents.git) into
#            ~/.local/share/agent-registry via .chezmoiexternal.toml.tmpl and
#            run its installer (run_after_sync-agents.sh.tmpl), which fans the
#            canonical agents out to each tool's native format (Claude, Codex,
#            opencode, Copilot). Personal-only: the registry lives on the
#            user's personal GitHub (SSH) and the agents are personal content.
#   token_auditor — install the standalone token-auditor uv tool from its
#            public repo (github.com/stevencarpenter/token-auditor) via
#            run_onchange_install-token-auditor.sh.tmpl, putting token-auditor /
#            codax on PATH for the codax/claade/opencade shell wrappers. The
#            pinned version lives in .chezmoidata/tools.toml (set "latest" to
#            track main). Public https repo, so it installs on every machine;
#            the capability just lets a machine opt out.
#
# Note on VPN: there is intentionally no `wireguard` capability. The home
# network uses Tailscale (which speaks WireGuard under the hood) for the
# "phone home" use case; if a future device needs a raw WG tunnel, add the
# capability then with a real consumer in tree.
#
# When adding a capability, add the key to every row below and gate the
# relevant templates / .chezmoiignore lines on
# `(index .machines .machine).<capability>`.

[machines.personal-mac]
# tiling is OFF here despite this being a GUI machine: the M5 personal MacBook
# runs the macOS 27.0 beta, which is incompatible with aerospace + sketchybar +
# borders (crashes / broken windowing). Disabling the capability keeps the
# tiling stack from installing, deploying config, or being auto-started by
# .chezmoiscripts/darwin/run_onchange_after_start-tiling-stack.sh on apply.
# TODO(tiling): flip back to true once macOS 27 is stable and the stack works
# again (greppable marker so this temporary beta workaround resurfaces).
tiling = false
atuin = true
mcp = true
skills = true
gui = true
dev = true
aws_sso = false
infra = false
agent_journal = true
agents = true
token_auditor = true

[machines.work-mac]
tiling = true
atuin = false
mcp = true
skills = true
gui = true
dev = false
aws_sso = true
infra = true
agent_journal = false
agents = false
token_auditor = true

[machines.lab-mac]
# 2019 i9 Intel MacBook Pro, accessed via macOS Screen Share. Home-server
# defacto: runs adguard + Tailscale for the LAN, hosts the self-hosted
# atuin sync server (so atuin is also true here as a client). Currently
# being stood up — Claude Code + MCP fan-out are on so the assistant has
# local context (lab.json overlay carries just the Grafana MCP for
# home-ops — Railway is a plugin now, not an MCP server). No dev / work /
# aws_sso, and no local LM (hippo is personal-only).
# Flip `infra = true` once homelab IaC (terraform / k8s) actually moves
# here. Flip `gui = false` once stand-up is done and Screen Share use
# tapers off.
tiling = false
atuin = true
mcp = true
skills = true
gui = true
dev = false
aws_sso = false
infra = false
agent_journal = false
agents = false
token_auditor = true
