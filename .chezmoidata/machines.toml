# Machine capability table.
#
# Each row maps a machine name (matching the `.machine` data variable from
# .chezmoi.toml.tmpl) to a set of capability booleans. Templates and
# .chezmoiignore gate on these capabilities rather than on machine name
# prefixes so that adding a new machine is a one-row change here, not a
# scavenger hunt across every gate site.
#
# Access pattern in templates:
#   {{ if (index .machines .machine).tiling }} ... {{ end }}
#
# Adding a new machine: copy a row, rename, flip the capabilities you don't
# want. Adding a new capability: add the key to every row (default-false is
# fine if you also update the gate sites with `default false` on lookups).
#
# Capabilities
#   tiling — install/configure aerospace + sketchybar + borders (the tiling
#            window manager stack). Headless / Screen Share boxes set this
#            false because point-and-click + native macOS windowing is
#            preferred there.
#   atuin  — deploy ~/.config/atuin/config.toml pointing at the self-hosted
#            atuin server (homelab repo: services/atuin/). Off on work
#            machines so corporate shells never sync history to the home lab.
#   mcp    — deploy the MCP master config + run the post-apply sync hook that
#            generates per-tool MCP configs (codex, opencode, cursor, copilot,
#            …). Off on machines that don't run a constellation of AI dev
#            tools (e.g., lab-mac is a headless server — Claude Code only).
#   hippo  — deploy ~/.config/hippo/ and wire the hippo SessionStart hook into
#            ~/.claude/settings.json. Off on machines that don't run the
#            hippo brain locally.
#   gui    — install GUI applications + display fonts. On for any machine
#            with a usable display, including lab-mac which is reached via
#            macOS Screen Share (so Raycast / Ghostty / Obsidian / VS Code
#            / 1Password etc. stay useful there). Only flip false for
#            genuinely headless boxes with no Screen Share path. CLI tools
#            that ship as `cask` (e.g. 1password-cli) stay outside this gate.
#   dev    — machine does language / web / mobile development. Gates
#            language-LSP plugins, copilot trusted folders for personal
#            projects, and dev-flavored Brewfile entries. Off on work
#            because work has its own dev-tool curation (mise infra block,
#            corporate dev environment) that we don't want to double-stack.
#   aws_sso — machine should run the AWS SSO profile generator
#            (aws_config_gen/) via the post-apply hook. Work-only because
#            personal / lab don't have AWS SSO. Scoped narrower than a
#            generic `aws` capability so future AWS-adjacent gates (CLI,
#            SDK, profiles) can carry their own keys without overloading.
#   infra  — install infrastructure / cluster-ops tooling via mise:
#            Kubernetes (kubectl, helm, k9s, kustomize, minikube, argo),
#            IaC (terraform), build (gradle, pnpm, goreleaser), corporate
#            access (teleport-ent), and ops databases (mysql, duckdb).
#            Distinct from `aws_sso` so AWS-only gates stay narrow; lab
#            can flip this on later if homelab k8s/terraform work moves
#            there.
#
# When adding a capability, add the key to every row below and gate the
# relevant templates / .chezmoiignore lines on
# `(index .machines .machine).<capability>`.

[machines.personal-mac]
tiling = true
atuin = true
mcp = true
hippo = true
gui = true
dev = true
aws_sso = false
infra = false

[machines.work-mac]
tiling = true
atuin = false
mcp = true
hippo = false
gui = true
dev = false
aws_sso = true
infra = true

[machines.lab-mac]
# 2019 i9 MacBook Pro accessed via macOS Screen Share, used as a personal
# homelab. Runs full Claude Code + MCP fan-out (mcp = true) and does
# language/web/mobile development through the Screen Share session
# (dev = true). Tiling off because Screen Share prefers native macOS
# windowing, and hippo off because no local LM is hosted here.
tiling = false
atuin = true
mcp = true
hippo = false
gui = true
dev = true
aws_sso = false
infra = false
